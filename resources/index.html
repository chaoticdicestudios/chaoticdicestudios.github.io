  <style>
    /*
     * Scoped styles for the tools grid.
     * These sit below your existing style.css rules so they inherit
     * whatever variables / base styles you already have.
     * Move them into style.css once you're happy with them.
     */

    .tools-grid {
      width: 100%;
      max-width: 720px;
      margin: 2rem auto 0;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      padding: 0 1rem;
    }

    .tool-card {
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.4rem 1.2rem;
      text-decoration: none;
      color: inherit;
      transition: background 150ms ease, border-color 150ms ease, transform 100ms ease;
    }

    .tool-card:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.18);
    }

    .tool-card__icon img {
      width: 240px;
      height: auto;
      display: block;
    }

    .tool-card__game {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 0.25rem;
    }

    .tool-card__title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 0.5rem;
    }

    .tool-card__desc {
      font-size: 0.83rem;
      opacity: 0.6;
      line-height: 1.55;
      flex: 1;
      margin-bottom: 1rem;
    }

    .tool-card__badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 20px;
      background: rgba(93,184,122,0.15);
      color: #5db87a;
      border: 1px solid rgba(93,184,122,0.25);
    }

    .tool-card__badge--soon {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.35);
      border-color: rgba(255,255,255,0.1);
    }

    .tool-card--coming-soon {
      opacity: 0.4;
      pointer-events: none;
    }
  </style>

</body>
</html>
