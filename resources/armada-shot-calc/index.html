<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armada Shot Calc</title>
  <meta name="description" content="Mantic Armada shooting modifier calculator. A free community tool by Chaotic Dice Studios.">

  <!-- Standard -->
  <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
  <link rel="shortcut icon" href="../../favicon.ico">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="application-name" content="Armada Shot Calc">
  <meta name="theme-color" content="#050e1c">

  <!-- PWA Apple -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Armada Shot">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/galleon-pwa-icon-180.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Permanent+Marker&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">

  <!-- CSS Style -->
  <link rel="stylesheet" href="styles.css">

  <script defer src="https://cloud.umami.is/script.js" data-website-id="42ec36c1-25f1-4bc5-8963-ef3c47a90265"></script>
</head>
<body class="no-scrollbars">
  <div class="app">

    <header class="app-header">
      <a href="https://game-icons.net/1x1/lorc/galleon.html" 
        class="header-ship-icon" 
        target="_blank" 
        rel="noopener noreferrer" 
        title="Icon by Lorc on Game-icons.net"
        aria-label="View icon source by Lorc on Game-icons.net">
        <img src="icons/galleon.svg" alt="Galleon Icon">
      </a>

      <h1 class="app-title">Armada Shot Calc</h1>
      <p class="app-subtitle">Mantic Armada · Shooting Modifier Calculator</p>
    </header>

    <main class="app-main">

      <!-- Progress bar - JS hides this on the result screen -->
      <div id="progressContainer">
        <div class="progress-meta">
          <span class="progress-label" id="progressLabel"></span>
          <span class="progress-count" id="progressCount"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div id="mainContent"></div>

      <!-- Navigation row - Back (left) and Reset (right) -->
      <!-- JS shows/hides these depending on which step we're on -->
      <div class="nav-row">
        <button class="btn-nav hidden" id="backBtn"  onclick="goBack()">← Back</button>
        <button class="btn-nav hidden" id="resetBtn" onclick="restart()">Reset ↺</button>
      </div>

    </main>

    <footer class="app-footer">
      <a class="footer-logo-link" href="../../" aria-label="Chaotic Dice Studios — Home" title="Chaotic Dice Studios — Home">
        <img src="../../images/logo.svg" alt="Chaotic Dice Studios">
      </a>
      <p class="footer-disclaimer">
        Free community tool · Not affiliated with or endorsed by Mantic Games Ltd.<br>
        Mantic Armada is &copy; Mantic Games Ltd. All rights reserved  · v1.1.9
      </p>
    </footer>

  </div><!-- /.app -->

  <!-- Data must load before app logic -->
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
