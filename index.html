<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaotic Dice Studios</title>
  <meta name="description" content="Chaotic Dice Studios — coming soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Exo+2:wght@200;300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:  #4dd9f7;
      --blue:  #2a8fef;
      --dim:   #1464b8;
      --silver: #8aaac8;
    }

    body {
      background: #03070f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Michroma', sans-serif;
      overflow: hidden;
    }

    /* Star field */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(1px 1px at 12% 10%, rgba(200,220,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 6%,  rgba(200,220,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 18%, rgba(200,220,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 87% 4%,  rgba(200,220,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  52%, rgba(200,220,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 45%, rgba(200,220,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 28% 82%, rgba(200,220,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 93% 75%, rgba(200,220,255,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 58%, rgba(150,210,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 18% 33%, rgba(200,220,255,0.3) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(20,100,184,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .stage {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadein 1.2s ease both;
    }

    /* ── DICE ── */
    .dice-wrap {
      display: flex; gap: 2.5rem;
      align-items: center;
      perspective: 600px;
    }

    .d8 svg {
      width: 90px; height: 90px;
      filter: drop-shadow(0 0 10px rgba(74,217,247,0.55))
              drop-shadow(0 0 28px rgba(20,100,184,0.35));
    }

    .d8-left  { animation: surge 4.8s ease-in-out infinite; }
    .d8-right { animation: surge 4.8s ease-in-out infinite; animation-delay: -2.4s; }

    @keyframes surge {
      0%   { transform: scale(1)    rotate(-12deg) translateY(0);    opacity: 0.8; }
      50%  { transform: scale(1.2)  rotate(-5deg)  translateY(-8px); opacity: 1;   }
      100% { transform: scale(1)    rotate(-12deg) translateY(0);    opacity: 0.8; }
    }
    .d8-right { animation-name: surge-r; }
    @keyframes surge-r {
      0%   { transform: scale(1)    rotate(12deg)  translateY(0);    opacity: 0.8; }
      50%  { transform: scale(1.2)  rotate(5deg)   translateY(-8px); opacity: 1;   }
      100% { transform: scale(1)    rotate(12deg)  translateY(0);    opacity: 0.8; }
    }

    /* ── TEXT ── */
    .brand {
      text-align: center;
    }

    .brand-name {
      font-size: clamp(1.6rem, 5.5vw, 3.2rem);
      letter-spacing: 0.07em;
      color: #e8f4ff;
      text-shadow: 0 0 40px rgba(74,217,247,0.3), 0 0 80px rgba(20,100,184,0.2);
      line-height: 1;
    }

    .brand-sub {
      display: block;
      font-size: clamp(0.55rem, 1.6vw, 0.72rem);
      letter-spacing: 0.55em;
      color: var(--cyan);
      text-shadow: 0 0 16px rgba(74,217,247,0.6);
      margin-top: 0.6em;
    }

    /* divider */
    .rule {
      display: flex; align-items: center; gap: 0.7rem;
      width: min(260px, 70vw);
    }
    .rule::before, .rule::after {
      content: ''; flex: 1; height: 1px;
    }
    .rule::before { background: linear-gradient(90deg, transparent, var(--blue)); }
    .rule::after  { background: linear-gradient(90deg, var(--blue), transparent); }
    .rule-gem {
      width: 5px; height: 5px;
      background: var(--cyan);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--cyan);
      flex-shrink: 0;
    }

    .coming-soon {
      font-family: 'Exo 2', sans-serif;
      font-weight: 200;
      font-style: italic;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.25em;
      color: var(--silver);
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="stage">

    <div class="dice-wrap">
      <!-- d8 left — face 3 -->
      <div class="d8 d8-left">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 96,36 82,92 18,92 4,36" fill="#060e1c" stroke="#4dd9f7" stroke-width="1.5"/>
          <polygon points="50,4  96,36 50,52" fill="rgba(74,217,247,0.06)" stroke="#2a8fef" stroke-width="0.8"/>
          <polygon points="50,4   4,36 50,52" fill="rgba(20,100,184,0.08)" stroke="#2a8fef" stroke-width="0.8"/>
          <polygon points="96,36 82,92 50,52" fill="rgba(8,18,34,0.9)"     stroke="#1464b8" stroke-width="0.8"/>
          <polygon points="4,36  18,92 50,52" fill="rgba(4,10,22,0.9)"     stroke="#1464b8" stroke-width="0.8"/>
          <polygon points="18,92 82,92 50,52" fill="rgba(74,217,247,0.04)" stroke="#2a8fef" stroke-width="0.8"/>
          <circle cx="50" cy="34" r="3.8" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="38" cy="60" r="3.8" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="62" cy="60" r="3.8" fill="#4dd9f7" opacity="0.95"/>
        </svg>
      </div>

      <!-- d8 right — face 8 -->
      <div class="d8 d8-right">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="50,4 96,36 82,92 18,92 4,36" fill="#060e1c" stroke="#4dd9f7" stroke-width="1.5"/>
          <polygon points="50,4  96,36 50,52" fill="rgba(74,217,247,0.08)" stroke="#2a8fef" stroke-width="0.8"/>
          <polygon points="50,4   4,36 50,52" fill="rgba(20,100,184,0.05)" stroke="#2a8fef" stroke-width="0.8"/>
          <polygon points="96,36 82,92 50,52" fill="rgba(8,18,34,0.9)"     stroke="#1464b8" stroke-width="0.8"/>
          <polygon points="4,36  18,92 50,52" fill="rgba(4,10,22,0.9)"     stroke="#1464b8" stroke-width="0.8"/>
          <polygon points="18,92 82,92 50,52" fill="rgba(74,217,247,0.04)" stroke="#2a8fef" stroke-width="0.8"/>
          <circle cx="38" cy="28" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="62" cy="28" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="38" cy="42" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="62" cy="42" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="38" cy="62" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="62" cy="62" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="38" cy="76" r="3" fill="#4dd9f7" opacity="0.95"/>
          <circle cx="62" cy="76" r="3" fill="#4dd9f7" opacity="0.95"/>
        </svg>
      </div>
    </div>

    <div class="brand">
      <p class="brand-name">Chaotic Dice Studios</p>
      <span class="brand-sub">Indie Tabletop Wargaming</span>
    </div>

    <div class="rule"><div class="rule-gem"></div></div>

    <p class="coming-soon">Coming Soon</p>

  </div>

</body>
</html>
